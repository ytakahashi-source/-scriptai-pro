    function inlineRender(text) {

    function RenderMd({ text }) {
      if (!text) return <p style={{color:"#475569",fontStyle:"italic",fontSize:"14px"}}>データなし</p>;
      const lines = text.split("\n");
      const elements = [];
      let tableLines = [], inTable = false;

      const flushTable = () => {
        if (tableLines.length < 2) { tableLines=[]; inTable=false; return; }
        const headers = tableLines[0].split("|").map(c=>c.trim()).filter(Boolean);
        const rows = tableLines.slice(2).filter(r=>!r.match(/^[\s|:-]+$/));
        elements.push(
          <div key={`t${elements.length}`} style={{overflowX:"auto",margin:"14px 0"}}>
            <table style={T.table}>
              <thead><tr>{headers.map((h,i)=><th key={i} style={T.th}>{h}</th>)}</tr></thead>
              <tbody>{rows.map((row,ri)=>{
                const cells=row.split("|").map(c=>c.trim()).filter(Boolean);
                return <tr key={ri} style={{background:ri%2===0?"rgba(255,255,255,0.02)":"transparent"}}>
                  {cells.map((c,ci)=><td key={ci} style={T.td}>{c}</td>)}
                </tr>;
              })}</tbody>
            </table>
          </div>
        );
        tableLines=[]; inTable=false;
      };

      lines.forEach((line,i)=>{
        if (line.startsWith("|")) { inTable=true; tableLines.push(line); return; }
        if (inTable) flushTable();
        if (line.startsWith("### ")) elements.push(<h3 key={i} style={T.h3}>{line.slice(4)}</h3>);
        else if (line.startsWith("## ")) elements.push(<h2 key={i} style={T.h2}>{line.slice(3)}</h2>);
        else if (line.startsWith("# ")) elements.push(<h1 key={i} style={T.h1}>{line.slice(2)}</h1>);
        else if (line.match(/^[-*] /)) elements.push(<li key={i} style={T.li}>{inlineRender(line.replace(/^[-*] /,""))}</li>);
        else if (line.match(/^\d+\. /)) elements.push(<li key={i} style={{...T.li,listStyle:"decimal inside"}}>{inlineRender(line.replace(/^\d+\. /,""))}</li>);
        else if (line==="---") elements.push(<hr key={i} style={T.hr}/>);
        else if (line.trim()==="") elements.push(<br key={i}/>);
        else elements.push(<p key={i} style={T.p}>{inlineRender(line)}</p>);
      });
      if (inTable) flushTable();
      return <div>{elements}</div>;
    }

        const iv = setInterval(() => { mi=(mi+1)%msgs.length; setLoadMsg(msgs[mi]); }, 2600);
        try {
          const msg = `# 求職者情報\n氏名: ${cand.name||"未入力"} ／ 年齢: ${cand.age||"未入力"} ／ 現職: ${cand.currentRole||"未入力"}\n現年収: ${cand.currentIncome||"未入力"} ／ 希望年収: ${cand.desiredIncome||"未入力"} ／ 居住地: ${cand.location||"未入力"}\n\n## 転職理由\n${cand.transferReason||"未入力"}\n\n## 希望条件\n${cand.desiredConditions||"未入力"}\n\n## 懸念・不安\n${cand.concerns||"未入力"}\n\n## 履歴書・職務経歴書\n${cand.resume||"未入力"}\n\n## 面談ログ\n${cand.interview||"未入力"}\n\n---\n\n# 提案先企業情報\n企業名: ${comp.name} ／ URL: ${comp.url||"未入力"}\n採用背景: ${comp.hiringBackground||"未入力"}\n補足: ${comp.additionalInfo||"未入力"}\n\n## 求人票・募集要項\n${comp.jobDescription||"未入力"}\n\n---\n${comp.url?"企業URLが提供されています。Web検索で最新情報を収集してスクリプトに反映してください。":""}\n指定フォーマット（## 1. 結論 〜 ## 12. 情報の根拠と不確実性）に従い、全12セクションを完全に出力してください。`;
          const tools = comp.url ? [{type:"web_search_20250305",name:"web_search"}] : undefined;
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:[{role:"user",content:msg}], ...(tools?{tools}:{}) }),
          });
          const data = await res.json();
          const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
          if (!text && data.error) throw new Error(data.error.message);
          setRawText(text);
          setSections(parseSections(text));
          setView("result");
          setActiveTab("s1");
          setTimeout(()=>resultRef.current?.scrollIntoView({behavior:"smooth"}),100);
        } catch(e) {
          setError(`エラー: ${e.message}`);
        } finally {
          clearInterval(iv); setLoading(false); setLoadMsg("");
        }
      };

      const F = ({label,hint,children}) => (
        <div style={St.field}>
          <label style={St.label}>{label}</label>
          {hint && <span style={St.hint}>{hint}</span>}
          {children}
        </div>
      );
      const Inp = ({label,hint,value,onChange,placeholder}) => (
        <F label={label} hint={hint}>
          <input style={St.input} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
        </F>
      );
      const TA = ({label,hint,value,onChange,placeholder,rows=4}) => (
        <F label={label} hint={hint}>
          <textarea style={St.textarea} rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
        </F>
      );
      const sc = (setter,k,v) => setter(p=>({...p,[k]:v}));

      return (
        <div style={St.root}>
          <div style={St.bgGlow}/>
          <header style={St.header}>
            <div style={St.hInner}>
              <div style={St.logoRow}>
                <span style={St.logoMark}>⚡</span>
                <span style={St.logoTxt}>ScriptAI</span>
                <span style={St.logoPro}>Pro</span>
                <span style={St.logoSep}>|</span>
                <span style={St.logoSub}>建設・不動産・営業職特化</span>
              </div>
              <p style={St.tagline}>トップ1% CAの提案ロジックを再現 ／ 面接意思獲得に特化した12セクション自動生成</p>
            </div>
          </header>

          {view==="input" && (
            <div style={St.main}>
              <div style={St.stepNav}>
                {[{i:0,icon:"👤",lbl:"求職者情報"},{i:1,icon:"🏢",lbl:"企業情報"}].map(({i,icon,lbl})=>(
                  <button key={i} style={{...St.stepBtn,...(inputStep===i?St.stepOn:{})}} onClick={()=>setInputStep(i)}>
                    <span style={{fontSize:"16px"}}>{icon}</span><span>{lbl}</span>
                    {inputStep>i && <span style={St.checkMark}>✓</span>}
                  </button>
                ))}
              </div>
              <div style={St.barTrack}><div style={{...St.barFill,width:inputStep===0?"33%":"66%"}}/></div>

              {inputStep===0 && (
                <div style={{...St.card,animation:"fadeIn 0.3s ease"}}>
                  <h2 style={St.cardTitle}>👤 求職者情報</h2>
                  <p style={St.cardDesc}>経歴・本人発言・懸念を詳細に入れるほど、スクリプト精度が上がります</p>
                  <div style={St.g3}>
                    <Inp label="氏名" value={cand.name} onChange={v=>sc(setCand,"name",v)} placeholder="山田 太郎"/>
                    <Inp label="年齢" value={cand.age} onChange={v=>sc(setCand,"age",v)} placeholder="34歳"/>
                    <Inp label="現職・役職" value={cand.currentRole} onChange={v=>sc(setCand,"currentRole",v)} placeholder="施工管理 主任"/>
                  </div>
                  <div style={St.g3}>
                    <Inp label="現年収" value={cand.currentIncome} onChange={v=>sc(setCand,"currentIncome",v)} placeholder="450万円"/>
                    <Inp label="希望年収" value={cand.desiredIncome} onChange={v=>sc(setCand,"desiredIncome",v)} placeholder="550万円以上"/>
                    <Inp label="居住地" value={cand.location} onChange={v=>sc(setCand,"location",v)} placeholder="東京都 江東区"/>
                  </div>
                  <TA label="転職理由（本人の発言・コメント）" hint="💡 面談でのリアルな言葉をそのまま入れると精度UP" value={cand.transferReason} onChange={v=>sc(setCand,"transferReason",v)} rows={3} placeholder='例：「現場の裁量が少ない。もっと提案できる環境に行きたい」'/>
                  <TA label="希望条件（表面・本質）" value={cand.desiredConditions} onChange={v=>sc(setCand,"desiredConditions",v)} rows={3} placeholder="年収・勤務地・休日・キャリアパス・職種など"/>
                  <TA label="懸念・不安（本人発言）" hint="💡 断りそうな理由を先回りするために重要" value={cand.concerns} onChange={v=>sc(setCand,"concerns",v)} rows={3} placeholder='例：「転職回数が多い」「小さい会社は嫌だ」など'/>
                  <div style={St.uploadGrid}>
                    <div style={St.uploadBox}>
                      <p style={St.uploadTitle}>📄 履歴書・職務経歴書</p>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                        <input type="file" accept=".txt,.docx,.vtt,.srt" id="r1" style={{display:"none"}} onChange={e=>readFile(e,"resume",setCand)}/>
                        <label htmlFor="r1" style={St.fileBtn}>ファイルをアップロード</label>
                        <span style={St.hint}>.txt 対応</span>
                      </div>
                      <textarea style={St.textarea} rows={5} value={cand.resume} onChange={e=>setCand(p=>({...p,resume:e.target.value}))} placeholder="または直接テキストを貼り付け..."/>
                    </div>
                    <div style={St.uploadBox}>
                      <p style={St.uploadTitle}>🎙️ 面談ログ（Zoom / Phone）</p>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
                        <input type="file" accept=".txt,.vtt,.srt" id="i1" style={{display:"none"}} onChange={e=>readFile(e,"interview",setCand)}/>
                        <label htmlFor="i1" style={St.fileBtn}>ファイルをアップロード</label>
                        <span style={St.hint}>.txt / .vtt 対応</span>
                      </div>
                      <textarea style={St.textarea} rows={5} value={cand.interview} onChange={e=>setCand(p=>({...p,interview:e.target.value}))} placeholder="面談での発言・印象・気になったコメントを貼り付け..."/>
                    </div>
                  </div>
                  <div style={St.btnRight}>
                    <button style={St.nextBtn} onClick={()=>setInputStep(1)}>企業情報へ →</button>
                  </div>
                </div>
              )}

              {inputStep===1 && (
                <div style={{...St.card,animation:"fadeIn 0.3s ease"}}>
                  <h2 style={St.cardTitle}>🏢 提案先企業情報</h2>
                  <p style={St.cardDesc}>HPのURLを入力すると、AIがWeb検索で最新情報を自動収集・反映します</p>
                  <div style={St.g2}>
                    <Inp label="企業名 *" value={comp.name} onChange={v=>sc(setComp,"name",v)} placeholder="株式会社〇〇建設"/>
                    <Inp label="企業HP URL" value={comp.url} onChange={v=>sc(setComp,"url",v)} placeholder="https://example.co.jp"/>
                  </div>
                  <TA label="📋 求人票・募集要項" rows={7} value={comp.jobDescription} onChange={v=>sc(setComp,"jobDescription",v)} placeholder="求人票の全文・募集ポジション・求めるスキル・年収レンジをまるごと貼り付けてください"/>
                  <TA label="採用背景・担当者メモ（任意）" hint="💡 採用担当者の発言・会社の課題・緊急度など" value={comp.hiringBackground} onChange={v=>sc(setComp,"hiringBackground",v)} rows={3} placeholder='例：「施工管理が1名退職予定で即戦力が必要」'/>
                  <TA label="その他補足（任意）" value={comp.additionalInfo} onChange={v=>sc(setComp,"additionalInfo",v)} rows={2} placeholder="過去の選考実績・社風・CA所感など"/>
                  {comp.url && (
                    <div style={St.infoBox}>
                      <span style={{fontSize:"20px"}}>🤖</span>
                      <div>
                        <strong style={{color:"#93c5fd",fontSize:"13px"}}>Web自動収集が有効</strong>
                        <p style={{margin:"2px 0 0",fontSize:"12px",color:"#475569"}}>{comp.url} の最新情報をAIが検索してスクリプトに反映します</p>
                      </div>
                    </div>
                  )}
                  {error && <div style={St.errBox}>{error}</div>}
                  <div style={St.btnRow}>
                    <button style={St.backBtn} onClick={()=>setInputStep(0)}>← 戻る</button>
                    <button style={{...St.genBtn,opacity:(loading||!comp.name)?0.55:1}} disabled={loading||!comp.name} onClick={generate}>
                      {loading ? <><span style={St.spin}/><span>{loadMsg}</span></> : <><span>✨</span><span>12セクション 提案スクリプトを生成する</span></>}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {view==="result" && (
            <div style={St.resultWrap} ref={resultRef}>
              <div style={St.rHead}>
                <div>
                  <span style={St.rBadge}>完成</span>
                  <h2 style={St.rTitle}>提案スクリプト</h2>
                  <p style={St.rMeta}>{cand.name||"求職者"} → {comp.name} ／ {new Date().toLocaleDateString("ja-JP")}</p>
                </div>
                <div style={St.rActions}>
                  <button style={St.btnCopy} onClick={()=>navigator.clipboard.writeText(rawText)}>📋 全文コピー</button>
                  <button style={St.btnRegen} onClick={()=>{setView("input");setInputStep(1);}}>🔄 再生成</button>
                  <button style={St.btnNew} onClick={()=>{setView("input");setInputStep(0);setSections({});}}>＋ 新規</button>
                </div>
              </div>
              <div style={St.tabBar}>
                {SECTIONS.map(sec=>(
                  <button key={sec.id} style={{...St.tab,...(activeTab===sec.id?St.tabOn:{})}} onClick={()=>setActiveTab(sec.id)}>
                    <span style={{fontSize:"15px"}}>{sec.icon}</span>
                    <span style={{fontSize:"10px",marginTop:"2px"}}>{sec.label}</span>
                  </button>
                ))}
              </div>
              {SECTIONS.map(sec=>activeTab===sec.id&&(
                <div key={sec.id} style={{...St.secCard,animation:"fadeIn 0.2s ease"}}>
                  <div style={St.secHead}>
                    <span style={{fontSize:"22px"}}>{sec.icon}</span>
                    <h3 style={St.secTitle}>{sec.label}</h3>
                    <button style={St.secCopy} onClick={()=>navigator.clipboard.writeText(sections[sec.id]||"")}>コピー</button>
                  </div>
                  <div style={St.secBody}>
                    {sections[sec.id] ? <RenderMd text={sections[sec.id]}/> : <p style={{color:"#334155",fontStyle:"italic",fontSize:"14px"}}>このセクションのデータが見当たりません。「全文コピー」で確認してください。</p>}
                  </div>
                </div>
              ))}
              <div style={St.qNav}>
                {SECTIONS.map((sec,i)=>(
                  <button key={sec.id} style={{...St.qBtn,...(activeTab===sec.id?St.qBtnOn:{})}} onClick={()=>setActiveTab(sec.id)} title={sec.label}>{i+1}</button>
                ))}
              </div>
              <div style={St.tips}>
                <strong style={{color:"#86efac",fontSize:"13px"}}>💡 活用のヒント</strong>
                <div style={{display:"flex",gap:"20px",flexWrap:"wrap",marginTop:"8px"}}>
                  {["📞 「電話スクリプト」タブをそのまま読み上げる","💬 「LINE/SMS」タブをコピーして即送信","🛡️ 「反論切り返し」タブで断り対応を事前準備","⚠️ 「CA向け注意点」タブで押しすぎを防止"].map((t,i)=>(
                    <span key={i} style={{fontSize:"12px",color:"#475569"}}>{t}</span>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
